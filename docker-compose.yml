version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: zest_db
    restart: always
    environment:
      POSTGRES_USER: zest_user
      POSTGRES_PASSWORD: zest_password_123!!!
      POSTGRES_DB: zest_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zest_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://zest_user:zest_password_123!!!@db:5432/zest_db
      - SECRET_KEY=supersecretkeythatsshouldbechangedinproduction123!!!
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zest_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: zest_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
